<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mini Firebase Web Chat</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#0f172a;
}

/* FLOAT BUTTON */

#openChat{
  position:fixed;
  left:20px;
  bottom:20px;
  width:68px;
  height:68px;
  border:none;
  border-radius:50%;
  background:#10b981;
  color:white;
  font-size:24px;
  cursor:pointer;
  z-index:99999;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* MAIN CHAT */

#chatApp{
  position:fixed;
  left:20px;
  bottom:100px;
  width:380px;
  height:640px;
  background:#111827;
  border-radius:25px;
  overflow:hidden;
  display:none;
  flex-direction:column;
  z-index:99999;
  box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

/* HEADER */

.chat-header{
  height:70px;
  background:#10b981;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
  color:white;
  font-size:20px;
  font-weight:bold;
}

#closeChat{
  cursor:pointer;
  font-size:22px;
}

/* LOGIN */

#loginPage{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:25px;
}

#loginPage h1{
  color:white;
}

.googleBtn{
  padding:15px 25px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
  background:white;
}

.googleBtn i{
  margin-right:8px;
}

/* APP */

#mainApp{
  display:none;
  flex-direction:column;
  height:100%;
}

/* USER */

.user-bar{
  background:#1f2937;
  padding:12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.user-left{
  display:flex;
  align-items:center;
  gap:12px;
}

.user-left img{
  width:45px;
  height:45px;
  border-radius:50%;
}

.user-left div{
  color:white;
}

.logoutBtn{
  border:none;
  background:#ef4444;
  color:white;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
}

/* PAGES */

.page{
  display:none;
  flex:1;
  overflow-y:auto;
  padding:15px;
}

.page.active{
  display:block;
}

/* FRIENDS */

.addFriend{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.addFriend input{
  flex:1;
  border:none;
  border-radius:10px;
  padding:12px;
  outline:none;
}

.addFriend button{
  border:none;
  background:#10b981;
  color:white;
  padding:12px 16px;
  border-radius:10px;
  cursor:pointer;
}

.friendCard{
  background:#1f2937;
  color:white;
  padding:14px;
  border-radius:15px;
  margin-bottom:12px;
  cursor:pointer;
  border:2px solid transparent;
  transition:0.2s;
}

.friendCard:hover{
  border-color:#10b981;
}

/* CHAT */

#chatTop{
  color:white;
  margin-bottom:15px;
  font-size:18px;
  font-weight:bold;
}

#messages{
  display:flex;
  flex-direction:column;
  gap:12px;
  padding-bottom:10px;
}

.message{
  max-width:78%;
  padding:12px;
  border-radius:18px;
  color:white;
  word-wrap:break-word;
}

.me{
  align-self:flex-end;
  background:#10b981;
  border-bottom-right-radius:5px;
}

.other{
  align-self:flex-start;
  background:#374151;
  border-bottom-left-radius:5px;
}

.msgTime{
  margin-top:6px;
  font-size:11px;
  opacity:0.8;
}

/* SEND */

.sendBox{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.sendBox input{
  flex:1;
  padding:14px;
  border:none;
  border-radius:12px;
  outline:none;
}

.sendBox button{
  width:55px;
  border:none;
  border-radius:12px;
  background:#10b981;
  color:white;
  cursor:pointer;
  font-size:18px;
}

/* HISTORY */

.historyCard{
  background:#1f2937;
  color:white;
  padding:14px;
  border-radius:15px;
  margin-bottom:12px;
}

/* BOTTOM NAV */

.bottomNav{
  height:72px;
  background:#1f2937;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

.navBtn{
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:5px;
  cursor:pointer;
}

.navBtn.active{
  color:#10b981;
}

.navBtn span{
  font-size:12px;
}

/* SCROLL */

::-webkit-scrollbar{
  width:5px;
}

::-webkit-scrollbar-thumb{
  background:#10b981;
  border-radius:10px;
}

@media(max-width:500px){

  #chatApp{
    width:95%;
    left:2.5%;
    bottom:90px;
  }

}
</style>
</head>
<body>

<!-- OPEN BUTTON -->

<button id="openChat">
  <i class="fa-solid fa-comments"></i>
</button>

<!-- CHAT -->

<div id="chatApp">

  <div class="chat-header">
    MINI CHAT
    <i id="closeChat" class="fa-solid fa-xmark"></i>
  </div>

  <!-- LOGIN -->

  <div id="loginPage">

    <h1>Sign In</h1>

    <button class="googleBtn" id="googleLogin">
      <i class="fa-brands fa-google"></i>
      Sign in with Google
    </button>

  </div>

  <!-- APP -->

  <div id="mainApp">

    <!-- USER BAR -->

    <div class="user-bar">

      <div class="user-left">

        <img id="userPhoto">

        <div>
          <div id="userName"></div>
          <small id="userEmail"></small>
        </div>

      </div>

      <button class="logoutBtn" id="logoutBtn">
        Logout
      </button>

    </div>

    <!-- CHATS -->

    <div class="page active" id="chatPage">

      <div id="chatTop">
        Global Chat
      </div>

      <div id="messages"></div>

      <div class="sendBox">

        <input
          type="text"
          id="messageInput"
          placeholder="Type message..."
        >

        <button id="sendBtn">
          <i class="fa-solid fa-paper-plane"></i>
        </button>

      </div>

    </div>

    <!-- FRIENDS -->

    <div class="page" id="friendsPage">

      <div class="addFriend">

        <input
          type="email"
          id="friendEmail"
          placeholder="Friend email"
        >

        <button id="addFriendBtn">
          Add
        </button>

      </div>

      <div id="friendsList"></div>

    </div>

    <!-- HISTORY -->

    <div class="page" id="historyPage">

      <div id="historyList"></div>

    </div>

    <!-- NAV -->

    <div class="bottomNav">

      <div class="navBtn active" data-page="chatPage">
        <i class="fa-solid fa-comment"></i>
        <span>Chats</span>
      </div>

      <div class="navBtn" data-page="friendsPage">
        <i class="fa-solid fa-user-plus"></i>
        <span>Friends</span>
      </div>

      <div class="navBtn" data-page="historyPage">
        <i class="fa-solid fa-clock"></i>
        <span>History</span>
      </div>

    </div>

  </div>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  setDoc,
  doc,
  getDocs,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* =========================
   FIREBASE CONFIG
========================= */

const firebaseConfig = {
  apiKey: "AIzaSyATO3ZCHwuXg77_uFx_AViRZdhG1WB9Jyw",
  authDomain: "ecopulse-6042f.firebaseapp.com",
  databaseURL: "https://ecopulse-6042f-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ecopulse-6042f",
  storageBucket: "ecopulse-6042f.firebasestorage.app",
  messagingSenderId: "563008346528",
  appId: "1:563008346528:web:67ed328e7c95d0737decc5",
  measurementId: "G-V16SC82V8H"
};

/* ========================= */

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

const provider = new GoogleAuthProvider();

let currentUser = null;

/* OPEN CLOSE */

const openChat = document.getElementById("openChat");

const chatApp = document.getElementById("chatApp");

const closeChat = document.getElementById("closeChat");

openChat.onclick = () => {

  chatApp.style.display = "flex";

};

closeChat.onclick = () => {

  chatApp.style.display = "none";

};

/* GOOGLE LOGIN */

document
.getElementById("googleLogin")
.onclick = async () => {

  try{

    await signInWithPopup(auth, provider);

  }catch(err){

    alert(err.message);

  }

};

/* AUTH STATE */

onAuthStateChanged(auth, async (user)=>{

  if(user){

    currentUser = user;

    document.getElementById("loginPage")
    .style.display = "none";

    document.getElementById("mainApp")
    .style.display = "flex";

    document.getElementById("userPhoto")
    .src = user.photoURL;

    document.getElementById("userName")
    .innerText = user.displayName;

    document.getElementById("userEmail")
    .innerText = user.email;

    /* SAVE USER */

    await setDoc(
      doc(db,"users",user.uid),
      {
        name:user.displayName,
        email:user.email,
        photo:user.photoURL
      }
    );

    loadMessages();

    loadFriends();

  }else{

    document.getElementById("loginPage")
    .style.display = "flex";

    document.getElementById("mainApp")
    .style.display = "none";

  }

});

/* LOGOUT */

document
.getElementById("logoutBtn")
.onclick = async ()=>{

  await signOut(auth);

};

/* SEND MESSAGE */

document
.getElementById("sendBtn")
.onclick = async ()=>{

  const input =
  document.getElementById("messageInput");

  const text = input.value.trim();

  if(!text) return;

  await addDoc(
    collection(db,"messages"),
    {
      text:text,
      sender:currentUser.email,
      name:currentUser.displayName,
      time:serverTimestamp()
    }
  );

  input.value = "";

};

/* ENTER KEY */

document
.getElementById("messageInput")
.addEventListener("keypress",(e)=>{

  if(e.key === "Enter"){

    document
    .getElementById("sendBtn")
    .click();

  }

});

/* LOAD MESSAGES */

function loadMessages(){

  const q = query(
    collection(db,"messages"),
    orderBy("time","asc")
  );

  onSnapshot(q,(snapshot)=>{

    const messages =
    document.getElementById("messages");

    const history =
    document.getElementById("historyList");

    messages.innerHTML = "";

    history.innerHTML = "";

    snapshot.forEach((docSnap)=>{

      const data = docSnap.data();

      const div =
      document.createElement("div");

      div.className =
      data.sender === currentUser.email
      ? "message me"
      : "message other";

      let time = "";

      if(data.time?.toDate){

        time =
        data.time
        .toDate()
        .toLocaleString();

      }

      div.innerHTML = `
        <strong>${data.name}</strong><br><br>
        ${data.text}
        <div class="msgTime">
          ${time}
        </div>
      `;

      messages.appendChild(div);

      /* HISTORY */

      const historyDiv =
      document.createElement("div");

      historyDiv.className =
      "historyCard";

      historyDiv.innerHTML = `
        <strong>${data.name}</strong><br><br>
        ${data.text}<br><br>
        <small>${time}</small>
      `;

      history.appendChild(historyDiv);

    });

    messages.scrollTop =
    messages.scrollHeight;

  });

}

/* ADD FRIEND */

document
.getElementById("addFriendBtn")
.onclick = async ()=>{

  const emailInput =
  document.getElementById("friendEmail");

  const email =
  emailInput.value.trim();

  if(!email){

    alert("Enter email");

    return;

  }

  if(email === currentUser.email){

    alert("Cannot add yourself");

    return;

  }

  await addDoc(

    collection(
      db,
      "users",
      currentUser.uid,
      "friends"
    ),

    {
      email:email,
      addedBy:currentUser.email,
      createdAt:serverTimestamp()
    }

  );

  emailInput.value = "";

  loadFriends();

};

/* LOAD FRIENDS */

async function loadFriends(){

  const snapshot =
  await getDocs(

    collection(
      db,
      "users",
      currentUser.uid,
      "friends"
    )

  );

  const list =
  document.getElementById("friendsList");

  list.innerHTML = "";

  snapshot.forEach((docSnap)=>{

    const data =
    docSnap.data();

    const div =
    document.createElement("div");

    div.className = "friendCard";

    div.innerHTML = `
      <i class="fa-solid fa-user"></i>
      ${data.email}
    `;

    list.appendChild(div);

  });

}

/* NAVIGATION */

const navBtns =
document.querySelectorAll(".navBtn");

navBtns.forEach((btn)=>{

  btn.onclick = ()=>{

    navBtns.forEach((b)=>{

      b.classList.remove("active");

    });

    btn.classList.add("active");

    document
    .querySelectorAll(".page")
    .forEach((page)=>{

      page.classList.remove("active");

    });

    document
    .getElementById(btn.dataset.page)
    .classList.add("active");

  };

});

</script>

</body>
</html>
