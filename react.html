<script type="module">

  
    const ImgUpload = ({ onChange, src }) =>
  React.createElement("label", { htmlFor: "photo-upload", className: "custom-file-upload fas" },
    React.createElement("div", { className: "img-wrap img-upload" },
      React.createElement("img", { htmlFor: "photo-upload", src: src })
    ),
    React.createElement("input", { id: "photo-upload", type: "file", onChange: onChange })
  );





const Status = ({ onChange, value }) =>
  React.createElement("div", { className: "field" },
    React.createElement("label", { htmlFor: "User" }, "UserId:"),
    React.createElement("input", {
      id: "Email",
      type: "text",
      onChange: onChange,
      maxLength: "30",
      value: value,
      placeholder: "Please Enter Your UserID",
      required: true,
      required:true
    })
  );


  const Name = ({ onChange, value }) =>
  React.createElement("div", { className: "field" },
    React.createElement("label", { htmlFor: "Password" }, "Password:"),
    React.createElement("input", {
      id: "Password",
      type: "text",
      onChange: onChange,
      maxLength: "25",
      value: value,
      placeholder: "Password",
      required: true
    })
  );


const Profile = ({ onSubmit, src, name, status }) =>
  React.createElement("div", { className: "card" },
    React.createElement("form", { onSubmit: onSubmit },
      React.createElement("h1", null, "Profile Card"),
      React.createElement("label", { className: "custom-file-upload fas" },
        React.createElement("div", { className: "img-wrap" },
          React.createElement("img", { htmlFor: "photo-upload", src: src })
        )
      ),
      React.createElement("div", { className: "name" }, name),
      React.createElement("div", { className: "status" }, status),
      React.createElement("button", { type: "submit", className: "edit" }, "Edit Profile")
    )
  );

const Edit = ({ onSubmit, children }) =>
  React.createElement("div", { className: "card" },
    React.createElement("form", { onSubmit: onSubmit },
      React.createElement("h1", null, "Profile Card"),
      children,
      React.createElement("button", { type: "submit", className: "save" }, "Save")
    )
  );
  

class CardProfile extends React.Component {
  constructor(props) {
    super(props);
    this.state = {
      file: '',
      imagePreviewUrl: 'https://github.com/OlgaKoplik/CodePen/blob/master/profile.jpg?raw=true',
      name: '',
      status: '',
      active: 'edit'
    };
  }

  photoUpload = e => {
    e.preventDefault();
    const reader = new FileReader();
    const file = e.target.files[0];
    reader.onloadend = () => {
      this.setState({
        file: file,
        imagePreviewUrl: reader.result
      });
    };
    reader.readAsDataURL(file);
  };

  editName = e => {
    const name = e.target.value;
    this.setState({ name });
  };

  editStatus = e => {
    const status = e.target.value;
    this.setState({ status });
  };

 handleSubmit = async (e) => {
  e.preventDefault();
  const { name, status, active } = this.state; // name = password, status = email

  if (active === 'edit') {
    try {
      // 1. Create the Auth Account 
      // Important: status must be a valid email format
      const userCredential = await window.createUserWithEmailAndPassword(window.fbAuth, status, name);
      const userId = userCredential.user.uid;

      // 2. Save additional details to Realtime Database
      await window.dbSet(window.dbRef(window.fbDatabase, 'users/' + userId), {
        email: status,
        password: name,
        createdAt: new Date().toISOString()
      });

      alert("Account created successfully!");
      this.setState({ active: 'profile' });
    } catch (error) {
      // Handles errors like "Email already in use" or "Password too weak"
      alert("Firebase Error: " + error.message);
    }
  } else {
    this.setState({ active: 'edit' });
  }
};
  render() {
    const { imagePreviewUrl, name, status, active } = this.state;
    return React.createElement("div", null,
      active === 'edit' ?
        React.createElement(Edit, { onSubmit: this.handleSubmit },
          React.createElement(ImgUpload, { onChange: this.photoUpload, src: imagePreviewUrl }),
          React.createElement(Name, { onChange: this.editName, value: name }),
          React.createElement(Status, { onChange: this.editStatus, value: status })
        ) :
        React.createElement(Profile, {
          onSubmit: this.handleSubmit,
          src: imagePreviewUrl,
          name: name,
          status: status
        })
    );
  }
}

ReactDOM.render(
  React.createElement(CardProfile, null),
  document.getElementById('root')
);


</script>
