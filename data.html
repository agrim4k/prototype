<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Pulse live demographics</title>
    <link rel="stylesheet" href="style.css">
    <meta name="description"content="Real-time global population and live demographics insights powered by live public data">
  </head>
  
  <body>
   <header class="header">
     <div class="header-content">
       <h1>Global Pulse</h1>
       <p class="subtitle">
         Live demographic tracking and population estimates powered by live public streams.
       </p>
       
     </div>
   </header>
    <main>
      <section class="controls">
        <input
          type="text"
          id="searchInput"
          placeholder="Search for a country..."
          aria-label="Search Country"
          >
        
      </section>
      <section
        class="dashboard"
        id="dashboard"
        aria-live="polite"
      > 
      <div class="loader">
        Establishing secure connections to data streams...
      </div>
        
      </section>
      
    </main>
    <script src="script.js"></script>
  </body>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap');

/* ================================
   VARIABLES
================================ */
:root {
    --bg-color: #0b0f19;
    --card-bg: rgba(255, 255, 255, 0.03);
    --card-border: rgba(255, 255, 255, 0.08);

    --accent-primary: #00f0ff;
    --accent-secondary: #7000ff;

    --text-main: #f8fafc;
    --text-muted: #94a3b8;
}

/* ================================
   BASE RESET
================================ */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Space Grotesk', sans-serif;
    background-color: var(--bg-color);
    color: var(--text-main);
    min-height: 100vh;
    overflow-x: hidden;

    background-image:
        radial-gradient(circle at 15% 50%, rgba(0, 240, 255, 0.08), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(112, 0, 255, 0.08), transparent 25%);
    background-attachment: fixed;
}

/* ================================
   LAYOUT
================================ */
header {
    text-align: center;
    padding: 4rem 2rem 2rem;
}

.controls {
    display: flex;
    justify-content: center;
    padding: 0 2rem;
    margin-bottom: 3rem;
}

.dashboard {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 2rem 4rem;

    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1.5rem;
}

/* ================================
   TYPOGRAPHY
================================ */
h1 {
    font-size: 3rem;
    font-weight: 700;
    letter-spacing: -1px;
    margin-bottom: 1rem;

    background: linear-gradient(to right, var(--accent-primary), #ffffff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.subtitle {
    max-width: 600px;
    margin: 0 auto 2rem;
    font-size: 1.1rem;
    color: var(--text-muted);
}

/* ================================
   INPUT
================================ */
input[type="text"] {
    width: 100%;
    max-width: 400px;

    padding: 1rem 1.5rem;
    border-radius: 50px;

    border: 1px solid var(--card-border);
    background: rgba(0, 0, 0, 0.5);

    color: var(--text-main);
    font-family: inherit;
    font-size: 1rem;

    outline: none;
    backdrop-filter: blur(10px);

    transition: all 0.3s ease;
}

input[type="text"]:focus {
    border-color: var(--accent-primary);
    box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
}

/* ================================
   CARD COMPONENT
================================ */
.card {
    position: relative;
    overflow: hidden;

    padding: 1.5rem;
    border-radius: 20px;

    background: var(--card-bg);
    border: 1px solid var(--card-border);

    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);

    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

/* Top glow bar */
.card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;

    width: 100%;
    height: 4px;

    background: linear-gradient(90deg, var(--accent-secondary), var(--accent-primary));
    opacity: 0;

    transition: opacity 0.3s ease;
}

/* Hover effects */
.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
}

.card:hover::before {
    opacity: 1;
}

/* ================================
   CARD CONTENT
================================ */
.card-header {
    display: flex;
    align-items: center;
    gap: 1rem;

    margin-bottom: 1.5rem;
}

.flag {
    width: 40px;
    height: 40px;

    border-radius: 50%;
    object-fit: cover;

    border: 2px solid rgba(255,255,255,0.1);
}

.country-name {
    font-size: 1.25rem;
    font-weight: 600;
}

.region {
    font-size: 0.85rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
}

/* ================================
   POPULATION BLOCK
================================ */
.population-container {
    margin-top: 1rem;
}

.label {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
}

.population {
    display: flex;
    align-items: baseline;
    gap: 5px;

    font-size: 2.5rem;
    font-weight: 700;

    color: var(--accent-primary);
    font-variant-numeric: tabular-nums;
}

/* ================================
   LIVE INDICATOR
================================ */
.indicator {
    width: 8px;
    height: 8px;

    border-radius: 50%;
    background-color: #10b981;

    box-shadow: 0 0 10px #10b981;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0%   { opacity: 1; transform: scale(1); }
    50%  { opacity: 0.4; transform: scale(1.2); }
    100% { opacity: 1; transform: scale(1); }
}

/* ================================
   LOADER
================================ */
.loader {
    grid-column: 1 / -1;
    text-align: center;

    font-size: 1.2rem;
    color: var(--accent-primary);
}
  </style>
  <script>
    const dashboard = document.getElementById('dashboard');
const searchInput = document.getElementById('searchInput');

let countryData = [];

/* ================================
   API FETCH
================================ */
async function fetchCountries() {
    try {
        const response = await fetch(API_URL);
        const data = await response.json();

        countryData = processCountryData(data);

        renderDashboard(countryData);
        startLiveSimulation();

    } catch (error) {
        handleError(error);
    }
}

const API_URL = 'https://restcountries.com/v3.1/all?fields=name,population,flags,region';

/* ================================
   DATA PROCESSING
================================ */
function processCountryData(data) {
    return data
        .sort((a, b) => b.population - a.population)
        .map(country => ({
            ...country,
            currentPop: country.population,
            growthRate: generateGrowthRate(country.population)
        }));
}

function generateGrowthRate(population) {
    return population * (Math.random() * 0.00000005 + 0.00000001);
}

/* ================================
   RENDERING
================================ */
function renderDashboard(data) {
    dashboard.innerHTML = '';

    data.forEach((country, index) => {
        dashboard.appendChild(createCard(country, index));
    });
}

function createCard(country, index) {
    const card = document.createElement('div');
    card.className = 'card';

    card.innerHTML = `
        <div class="card-header">
            <img src="${country.flags.svg}" class="flag">
            <div>
                <div class="country-name">${country.name.common}</div>
                <div class="region">${country.region}</div>
            </div>
        </div>

        <div class="population-container">
            <div class="label">Estimated Population</div>
            <div class="population">
                <span class="indicator"></span>
                <span id="pop-${index}">
                    ${formatNumber(country.currentPop)}
                </span>
            </div>
        </div>
    `;

    return card;
}

/* ================================
   SEARCH
================================ */
function handleSearch(e) {
    const searchTerm = e.target.value.toLowerCase();

    const filtered = countryData.filter(country =>
        country.name.common.toLowerCase().includes(searchTerm) ||
        country.region.toLowerCase().includes(searchTerm)
    );

    renderDashboard(filtered);
}

searchInput.addEventListener('input', handleSearch);

/* ================================
   LIVE SIMULATION
================================ */
function startLiveSimulation() {
    setInterval(updatePopulation, 1000);
}

function updatePopulation() {
    countryData.forEach((country, index) => {
        country.currentPop += country.growthRate;

        updateDOMPopulation(index, country.currentPop);
    });
}

function updateDOMPopulation(index, value) {
    const el = document.getElementById('pop-${index}');
    if (el) {
        el.innerText = formatNumber(value);
    }
}

/* ================================
   UTILS
================================ */
function formatNumber(num) {
    return Math.floor(num).toLocaleString();
}

function handleError(error) {
    dashboard.innerHTML =
        '<div class="loader" style="color:#ef4444;">Failed to load data stream. Please try again.</div>';
    console.error("Error fetching data:", error);
}

/* ================================
   INIT
================================ */
fetchCountries();
  </script>
